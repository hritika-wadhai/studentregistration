<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Green Valley Public School - Admission System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        /* Login Page Styles */
        body.login-body {
            background: linear-gradient(135deg, #1e2b6e 0%, #121b4a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }

        .school-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .school-header h1 {
            color: #1e2b6e;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .school-header p {
            color: #5a6e9c;
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #1e2b6e;
            font-weight: 700;
            font-size: 14px;
        }

        .form-group select,
        .form-group input {
            padding: 12px 14px;
            border: 1px solid #cfdde6;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.2s;
            background: #fefefe;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #1e2b6e;
            box-shadow: 0 0 0 2px rgba(30, 43, 110, 0.2);
        }

        .login-btn {
            background: #1e2b6e;
            color: white;
            padding: 13px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #0f1a4a;
        }

        .error-message {
            color: #e03a3a;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            display: none;
            font-weight: 500;
        }

        .role-description {
            background: #f0f4fa;
            padding: 16px;
            border-radius: 16px;
            margin-top: 24px;
            border-left: 5px solid #1e2b6e;
        }

        .role-description h4 {
            color: #1e2b6e;
            margin-bottom: 10px;
        }

        .role-description ul {
            padding-left: 20px;
        }

        .role-description li {
            margin-bottom: 6px;
            font-size: 13px;
            color: #2c3e66;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.8);
            font-size: 11px;
        }

        /* Main Dashboard Styles */
        .dashboard-body {
            background: #f0f2f8;
            margin: 0;
            padding: 24px;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        .app-header {
            background: #1e2b6e;
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid #2c3e77;
        }

        .logo-area h2 {
            color: white;
            font-size: 1.5rem;
            margin: 0;
        }

        .logo-area p {
            color: #b9c7e9;
            font-size: 0.8rem;
            margin: 0;
        }

        .user-panel {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-badge {
            background: #2d3f86;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: #b22234;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: #8b1a1a;
        }

        .content-area {
            padding: 28px 32px;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: #1e2b6e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-primary:disabled {
            background: #9aa5c2;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .search-card {
            background: #f8faff;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        .search-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 18px;
        }

        .search-field {
            flex: 1;
            min-width: 160px;
        }

        .search-field label {
            font-size: 12px;
            font-weight: 700;
            color: #1e2b6e;
            display: block;
            margin-bottom: 6px;
        }

        .search-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 13px;
        }

        .btn-clear {
            background: #64748b;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            border: 1px solid #e9edf2;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: #eef2ff;
            color: #1e2b6e;
            padding: 14px 10px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid #cbd5e1;
        }

        td {
            padding: 14px 10px;
            border-bottom: 1px solid #e2e8f0;
            vertical-align: middle;
        }

        tr:hover {
            background: #fafcff;
        }

        .action-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-edit {
            background: #2c5f2d;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete {
            background: #b91c1c;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
        }

        .view-only-badge {
            background: #e2e8f0;
            color: #2d3a5e;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }

        /* Form Section */
        .form-panel {
            background: white;
            border-radius: 24px;
            padding: 10px 0;
        }

        .section-card {
            border: 1px solid #e2edf2;
            border-radius: 24px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-title {
            background: #f1f5f9;
            padding: 14px 20px;
            font-weight: 800;
            color: #1e2b6e;
            border-bottom: 1px solid #e0e7ef;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 16px 20px;
        }

        .form-col {
            flex: 1;
            min-width: 180px;
        }

        .form-col label {
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
            color: #1f2b48;
        }

        .form-col input, .form-col select, .form-col textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e6;
            border-radius: 14px;
            font-size: 13px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 6px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 8px 0;
        }

        .required {
            color: #e53e3e;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 700px) {
            .content-area {
                padding: 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body id="appRoot">
    <!-- The entire application will be dynamically rendered based on login state -->
    <script>
        // ---------- STATIC DATA STORAGE (no API) ----------
        let studentsDatabase = [];
        let nextStudentId = 101;
        
        // Static role credentials (mock)
        const VALID_CREDENTIALS = {
            'admin': 'admin@123',
            'clerk': 'clerk@456',
            'teacher': 'teach@789'
        };
        
        const ROLE_DETAILS = {
            admin: { title: 'Admin Access', perms: ['Full control', 'Add/Edit/Delete students', 'Manage all data'] },
            clerk: { title: 'Admission Clerk', perms: ['Add new students', 'Edit existing records', 'View all data'] },
            teacher: { title: 'Teacher', perms: ['View only student data', 'No edit or delete'] }
        };
        
        // Preload some sample students
        function initSampleData() {
            if (studentsDatabase.length === 0) {
                studentsDatabase = [
                    { student_id: 101, name: 'Aarav Sharma', applying_class: '5th', city: 'Mumbai', father_name: 'Rajesh Sharma', father_contact: '9876543210', exams: 'Annual, Olympiad', 
                      first_name: 'Aarav', middle_name: '', last_name: 'Sharma', dob: '2014-05-12', age: 10, blood_group: 'O+', gender: 'Male', address: 'Andheri East', religion: 'Hindu', caste: 'General', mother_tongue: 'Hindi', aadhar: '123456789012', state: 'Maharashtra', pincode: '400093', previous_school: 'Sunrise School', father_occupation: 'Engineer', mother_name: 'Neha Sharma', mother_occupation: 'Teacher', mother_contact: '9876543211', emergency_contact: '9988776655', exams_array: [1,2] },
                    { student_id: 102, name: 'Isha Verma', applying_class: '8th', city: 'Pune', father_name: 'Anil Verma', father_contact: '9822334455', exams: 'Scholarship, Unit Test',
                      first_name: 'Isha', middle_name: '', last_name: 'Verma', dob: '2012-08-22', age: 12, blood_group: 'B+', gender: 'Female', address: 'Kothrud', religion: 'Hindu', caste: 'OBC', mother_tongue: 'Marathi', aadhar: '223344556677', state: 'Maharashtra', pincode: '411038', previous_school: 'City Public', father_occupation: 'Business', mother_name: 'Sunita Verma', mother_occupation: 'Homemaker', mother_contact: '9822334466', emergency_contact: '9922001188', exams_array: [3,2] },
                    { student_id: 103, name: 'Reyansh Nair', applying_class: '2nd', city: 'Bengaluru', father_name: 'Suresh Nair', father_contact: '9845012345', exams: 'School Annual',
                      first_name: 'Reyansh', middle_name: 'K', last_name: 'Nair', dob: '2018-01-10', age: 6, blood_group: 'A+', gender: 'Male', address: 'Whitefield', religion: 'Hindu', caste: 'General', mother_tongue: 'Malayalam', aadhar: '334455667788', state: 'Karnataka', pincode: '560066', previous_school: 'Tiny Tots', father_occupation: 'IT Manager', mother_name: 'Lakshmi Nair', mother_occupation: 'Designer', mother_contact: '9845016789', emergency_contact: '', exams_array: [1] }
                ];
                nextStudentId = 104;
            }
        }
        
        // Helper to format exams from array to string
        function formatExamsString(examsArray) {
            const examMap = {1:'Annual',2:'Unit/Terminal',3:'Scholarship',4:'Olympiad',5:'Entrance',6:'Navodaya',7:'Other'};
            if (!examsArray || examsArray.length === 0) return 'None';
            return examsArray.map(e => examMap[e] || e).join(', ');
        }
        
        // Get full student name from parts
        function buildFullName(first, middle, last) {
            let full = first;
            if (middle && middle.trim()) full += ' ' + middle.trim();
            if (last && last.trim()) full += ' ' + last.trim();
            return full;
        }
        
        // Save student to static array
        function saveStudentToDB(studentObj, isUpdate, oldId = null) {
            if (isUpdate && oldId) {
                const index = studentsDatabase.findIndex(s => s.student_id === oldId);
                if (index !== -1) {
                    studentObj.student_id = oldId;
                    studentsDatabase[index] = studentObj;
                    return true;
                }
                return false;
            } else {
                studentObj.student_id = nextStudentId++;
                studentsDatabase.push(studentObj);
                return true;
            }
        }
        
        function deleteStudentById(id) {
            const index = studentsDatabase.findIndex(s => s.student_id === id);
            if (index !== -1) {
                studentsDatabase.splice(index, 1);
                return true;
            }
            return false;
        }
        
        function getStudentById(id) {
            return studentsDatabase.find(s => s.student_id === id);
        }
        
        // ----- Session & Routing -----
        let currentRole = null;
        let currentView = 'dashboard'; // 'dashboard' or 'form'
        let editTargetId = null;
        
        // DOM references (will be set after render)
        let appContainer;
        
        // Render entire app based on auth state
        function renderApp() {
            const isLogged = sessionStorage.getItem('isLoggedIn') === 'true';
            currentRole = sessionStorage.getItem('currentUserRole');
            
            if (!isLogged || !currentRole || !VALID_CREDENTIALS[currentRole]) {
                renderLoginPage();
            } else {
                renderDashboard();
            }
        }
        
        function renderLoginPage() {
            document.body.className = 'login-body';
            document.body.innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <div class="school-header">
                            <h1>Green Valley Public School</h1>
                            <p>Student Admission Portal</p>
                        </div>
                        <form id="staticLoginForm" class="login-form">
                            <div class="form-group">
                                <label for="userRoleSelect">Select Role</label>
                                <select id="userRoleSelect" required>
                                    <option value="">-- Select Role --</option>
                                    <option value="admin">Admin</option>
                                    <option value="clerk">Admission Clerk</option>
                                    <option value="teacher">Teacher</option>
                                </select>
                            </div>
                            <div class="form-group" id="passwordGroupLogin">
                                <label for="passwordInput">Password</label>
                                <input type="password" id="passwordInput" placeholder="Enter password">
                            </div>
                            <button type="submit" class="login-btn">Login</button>
                            <div id="loginErrorMsg" class="error-message">Invalid credentials!</div>
                        </form>
                        <div id="roleInfoBox" class="role-description" style="display: none;">
                            <h4 id="roleTitle">Admin Access</h4>
                            <ul id="rolePermList"><li>Full system control</li></ul>
                        </div>
                    </div>
                    <div class="footer">© 2026 Green Valley Public School. All rights reserved.</div>
                </div>
            `;
            
            const roleSelect = document.getElementById('userRoleSelect');
            const passwordGroup = document.getElementById('passwordGroupLogin');
            const roleInfoDiv = document.getElementById('roleInfoBox');
            const roleTitleSpan = document.getElementById('roleTitle');
            const rolePermList = document.getElementById('rolePermList');
            
            function updateRoleInfo() {
                const role = roleSelect.value;
                if (role && ROLE_DETAILS[role]) {
                    roleInfoDiv.style.display = 'block';
                    passwordGroup.style.display = 'flex';
                    roleTitleSpan.innerText = ROLE_DETAILS[role].title;
                    rolePermList.innerHTML = ROLE_DETAILS[role].perms.map(p => `<li>${p}</li>`).join('');
                } else {
                    roleInfoDiv.style.display = 'none';
                    passwordGroup.style.display = 'none';
                }
            }
            
            roleSelect.addEventListener('change', updateRoleInfo);
            updateRoleInfo();
            
            document.getElementById('staticLoginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const selectedRole = roleSelect.value;
                const password = document.getElementById('passwordInput').value;
                const errorDiv = document.getElementById('loginErrorMsg');
                if (!selectedRole) {
                    errorDiv.textContent = 'Please select a role!';
                    errorDiv.style.display = 'block';
                    return;
                }
                if (VALID_CREDENTIALS[selectedRole] === password) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('currentUserRole', selectedRole);
                    renderApp();
                } else {
                    errorDiv.textContent = 'Invalid password for ' + (selectedRole === 'admin' ? 'Admin' : selectedRole === 'clerk' ? 'Clerk' : 'Teacher');
                    errorDiv.style.display = 'block';
                    document.getElementById('passwordInput').value = '';
                }
            });
        }
        
        function renderDashboard() {
            document.body.className = 'dashboard-body';
            initSampleData();
            
            document.body.innerHTML = `
                <div class="main-container">
                    <div class="app-header">
                        <div class="logo-area">
                            <h2>🌿 Green Valley Public School</h2>
                            <p>Student Admission Management</p>
                        </div>
                        <div class="user-panel">
                            <div class="user-badge" id="roleBadge">${currentRole === 'admin' ? 'Administrator' : currentRole === 'clerk' ? 'Admission Clerk' : 'Teacher'}</div>
                            <button class="logout-btn" id="globalLogoutBtn">Logout</button>
                        </div>
                    </div>
                    <div class="content-area" id="dynamicContent"></div>
                </div>
            `;
            
            document.getElementById('globalLogoutBtn').addEventListener('click', () => {
                sessionStorage.clear();
                renderApp();
            });
            
            const dynamicContainer = document.getElementById('dynamicContent');
            
            function renderListOrForm() {
                if (currentView === 'form') {
                    renderFormView(dynamicContainer);
                } else {
                    renderListView(dynamicContainer);
                }
            }
            
            renderListOrForm();
        }
        
        function renderListView(container) {
            const canAdd = (currentRole === 'admin' || currentRole === 'clerk');
            // search + table
            let searchFilters = { name: '', class: '', city: '', father: '', contact: '', exams: '' };
            
            function getFilteredStudents() {
                return studentsDatabase.filter(s => {
                    if (searchFilters.name && !s.name.toLowerCase().includes(searchFilters.name.toLowerCase())) return false;
                    if (searchFilters.class && !s.applying_class.toLowerCase().includes(searchFilters.class.toLowerCase())) return false;
                    if (searchFilters.city && !s.city.toLowerCase().includes(searchFilters.city.toLowerCase())) return false;
                    if (searchFilters.father && !s.father_name.toLowerCase().includes(searchFilters.father.toLowerCase())) return false;
                    if (searchFilters.contact && !s.father_contact.includes(searchFilters.contact)) return false;
                    if (searchFilters.exams && !s.exams.toLowerCase().includes(searchFilters.exams.toLowerCase())) return false;
                    return true;
                });
            }
            
            function buildTableHTML() {
                const filtered = getFilteredStudents();
                if (filtered.length === 0) return '<tr><td colspan="7" style="text-align:center">No students found</td></tr>';
                let rows = '';
                filtered.forEach(student => {
                    let actions = '';
                    if (currentRole === 'admin') {
                        actions = `<div class="action-btns"><button class="btn-edit" data-id="${student.student_id}" data-action="edit">Edit</button><button class="btn-delete" data-id="${student.student_id}" data-action="delete">Delete</button></div>`;
                    } else if (currentRole === 'clerk') {
                        actions = `<div class="action-btns"><button class="btn-edit" data-id="${student.student_id}" data-action="edit">Edit</button></div>`;
                    } else {
                        actions = `<span class="view-only-badge">View Only</span>`;
                    }
                    rows += `<tr>
                        <td>${escapeHtml(student.name)}</td>
                        <td>${escapeHtml(student.applying_class)}</td>
                        <td>${escapeHtml(student.city)}</td>
                        <td>${escapeHtml(student.father_name)}</td>
                        <td>${escapeHtml(student.father_contact)}</td>
                        <td>${escapeHtml(student.exams)}</td>
                        <td>${actions}</td>
                    </tr>`;
                });
                return rows;
            }
            
            function refreshTable() {
                const tbody = document.getElementById('studentTableBody');
                if (tbody) tbody.innerHTML = buildTableHTML();
                const resultSpan = document.getElementById('searchResultCount');
                if (resultSpan) resultSpan.innerText = `${getFilteredStudents().length} student(s)`;
                attachTableEvents();
            }
            
            function attachTableEvents() {
                document.querySelectorAll('.btn-edit').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = parseInt(btn.getAttribute('data-id'));
                        if (currentRole === 'teacher') { alert('Teacher cannot edit.'); return; }
                        editTargetId = id;
                        currentView = 'form';
                        renderDashboard(); // re-render to show form
                    });
                });
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (currentRole !== 'admin') { alert('Only admin can delete.'); return; }
                        const id = parseInt(btn.getAttribute('data-id'));
                        if (confirm('Permanently delete this student record?')) {
                            deleteStudentById(id);
                            refreshTable();
                        }
                    });
                });
            }
            
            container.innerHTML = `
                <div class="action-bar">
                    <button class="btn-primary" id="addNewStudentBtn" ${!canAdd ? 'disabled' : ''}>+ Add New Student</button>
                </div>
                <div class="search-card">
                    <div class="search-grid">
                        <div class="search-field"><label>Name</label><input type="text" id="searchName" placeholder="Search name"></div>
                        <div class="search-field"><label>Class</label><input type="text" id="searchClass" placeholder="Class"></div>
                        <div class="search-field"><label>City</label><input type="text" id="searchCity" placeholder="City"></div>
                        <div class="search-field"><label>Father's Name</label><input type="text" id="searchFather" placeholder="Father's name"></div>
                        <div class="search-field"><label>Contact</label><input type="text" id="searchContact" placeholder="Contact"></div>
                        <div class="search-field"><label>Exams</label><input type="text" id="searchExams" placeholder="Exam name"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                        <button class="btn-clear" id="clearSearchBtn">Clear Filters</button>
                        <span id="searchResultCount" style="font-size:13px; color:#1e2b6e;"></span>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>Name</th><th>Class</th><th>City</th><th>Father's Name</th><th>Contact</th><th>Exams Appeared</th><th>Actions</th></tr></thead>
                        <tbody id="studentTableBody"></tbody>
                    </table>
                </div>
            `;
            
            // search event listeners
            const nameInput = document.getElementById('searchName');
            const classInput = document.getElementById('searchClass');
            const cityInput = document.getElementById('searchCity');
            const fatherInput = document.getElementById('searchFather');
            const contactInput = document.getElementById('searchContact');
            const examsInput = document.getElementById('searchExams');
            const clearBtn = document.getElementById('clearSearchBtn');
            
            function updateFilters() {
                searchFilters = {
                    name: nameInput.value, class: classInput.value, city: cityInput.value,
                    father: fatherInput.value, contact: contactInput.value, exams: examsInput.value
                };
                refreshTable();
            }
            nameInput.addEventListener('input', updateFilters);
            classInput.addEventListener('input', updateFilters);
            cityInput.addEventListener('input', updateFilters);
            fatherInput.addEventListener('input', updateFilters);
            contactInput.addEventListener('input', updateFilters);
            examsInput.addEventListener('input', updateFilters);
            clearBtn.addEventListener('click', () => {
                nameInput.value = ''; classInput.value = ''; cityInput.value = ''; fatherInput.value = ''; contactInput.value = ''; examsInput.value = '';
                updateFilters();
            });
            
            document.getElementById('addNewStudentBtn')?.addEventListener('click', () => {
                if (!canAdd) { alert('Permission denied'); return; }
                editTargetId = null;
                currentView = 'form';
                renderDashboard();
            });
            
            refreshTable();
        }
        
        function renderFormView(container) {
            const isEdit = (editTargetId !== null);
            let studentData = null;
            if (isEdit) studentData = getStudentById(editTargetId);
            
            container.innerHTML = `
                <div class="form-panel">
                    <h3 style="margin-bottom: 20px;">${isEdit ? '✏️ Edit Student Record' : '📝 New Student Admission'}</h3>
                    <form id="dynamicStudentForm">
                        <div class="section-card"><div class="section-title">Student Information</div>
                            <div class="form-row"><div class="form-col"><label>First Name <span class="required">*</span></label><input id="fname" required value="${isEdit ? escapeHtml(studentData.first_name||'') : ''}"></div>
                            <div class="form-col"><label>Middle Name</label><input id="mname" value="${isEdit ? escapeHtml(studentData.middle_name||'') : ''}"></div>
                            <div class="form-col"><label>Last Name <span class="required">*</span></label><input id="lname" required value="${isEdit ? escapeHtml(studentData.last_name||'') : ''}"></div></div>
                            <div class="form-row"><div class="form-col"><label>DOB</label><input type="date" id="dob" required value="${isEdit ? studentData.dob||'' : ''}"></div>
                            <div class="form-col"><label>Age</label><input type="number" id="age" required value="${isEdit ? studentData.age||'' : ''}"></div>
                            <div class="form-col"><label>Blood Group</label><input id="bloodGroup" required value="${isEdit ? escapeHtml(studentData.blood_group||'') : ''}"></div></div>
                            <div class="form-row"><div class="form-col"><label>Gender</label><div class="radio-group"><label><input type="radio" name="gender" value="Male" ${isEdit && studentData.gender==='Male' ? 'checked' : ''}> Male</label><label><input type="radio" name="gender" value="Female" ${isEdit && studentData.gender==='Female' ? 'checked' : ''}> Female</label><label><input type="radio" name="gender" value="Other" ${isEdit && studentData.gender==='Other' ? 'checked' : ''}> Other</label></div></div>
                            <div class="form-col"><label>Address</label><textarea id="address" rows="2" required>${isEdit ? escapeHtml(studentData.address||'') : ''}</textarea></div></div>
                            <div class="form-row"><div class="form-col"><label>Religion</label><input id="religion" required value="${isEdit ? escapeHtml(studentData.religion||'') : ''}"></div>
                            <div class="form-col"><label>Caste</label><input id="caste" required value="${isEdit ? escapeHtml(studentData.caste||'') : ''}"></div>
                            <div class="form-col"><label>Aadhaar</label><input id="aadhaar" maxlength="12" required value="${isEdit ? escapeHtml(studentData.aadhar||'') : ''}"></div></div>
                            <div class="form-row"><div class="form-col"><label>State</label><select id="state"><option>Maharashtra</option><option>Karnataka</option><option>Gujarat</option></select></div>
                            <div class="form-col"><label>City</label><input id="city" required value="${isEdit ? escapeHtml(studentData.city||'') : ''}"></div>
                            <div class="form-col"><label>Pincode</label><input id="pincode" required value="${isEdit ? escapeHtml(studentData.pincode||'') : ''}"></div></div>
                            <div class="form-row"><div class="form-col"><label>Class Applying</label><select id="classApplying"><option>Nursery</option><option>1st</option><option>2nd</option><option>3rd</option><option>4th</option><option>5th</option><option>6th</option><option>7th</option><option>8th</option><option>9th</option><option>10th</option></select></div>
                            <div class="form-col"><label>Previous School</label><input id="prevSchool" value="${isEdit ? escapeHtml(studentData.previous_school||'') : ''}"></div></div>
                        </div>
                        <div class="section-card"><div class="section-title">Parent Details</div>
                            <div class="form-row"><div class="form-col"><label>Father's Name</label><input id="fatherName" required value="${isEdit ? escapeHtml(studentData.father_name||'') : ''}"></div>
                            <div class="form-col"><label>Father's Occupation</label><input id="fatherOcc" required value="${isEdit ? escapeHtml(studentData.father_occupation||'') : ''}"></div></div>
                            <div class="form-row"><div class="form-col"><label>Mother's Name</label><input id="motherName" required value="${isEdit ? escapeHtml(studentData.mother_name||'') : ''}"></div>
                            <div class="form-col"><label>Mother's Occupation</label><input id="motherOcc" required value="${isEdit ? escapeHtml(studentData.mother_occupation||'') : ''}"></div></div>
                            <div class="form-row"><div class="form-col"><label>Father Contact</label><input id="fatherContact" required value="${isEdit ? escapeHtml(studentData.father_contact||'') : ''}"></div>
                            <div class="form-col"><label>Mother Contact</label><input id="motherContact" required value="${isEdit ? escapeHtml(studentData.mother_contact||'') : ''}"></div>
                            <div class="form-col"><label>Emergency Contact</label><input id="emergencyContact" value="${isEdit ? escapeHtml(studentData.emergency_contact||'') : ''}"></div></div>
                        </div>
                        <div class="section-card"><div class="section-title">Exams</div><div class="checkbox-group" id="examsContainer"></div></div>
                        <div class="form-actions"><button type="submit" class="btn-primary">${isEdit ? 'Update Student' : 'Add Student'}</button><button type="button" id="cancelFormBtn" class="btn-clear">Cancel</button></div>
                    </form>
                </div>
            `;
            const examsList = [{val:1,lab:'Annual'},{val:2,lab:'Unit/Terminal'},{val:3,lab:'Scholarship'},{val:4,lab:'Olympiad'},{val:5,lab:'Entrance'},{val:6,lab:'Navodaya'},{val:7,lab:'Other'}];
            const examsContainer = document.getElementById('examsContainer');
            const selectedExams = isEdit && studentData.exams_array ? studentData.exams_array : [];
            examsList.forEach(ex => {
                const isChecked = selectedExams.includes(ex.val);
                examsContainer.innerHTML += `<label style="margin-right:12px"><input type="checkbox" name="examCheck" value="${ex.val}" ${isChecked ? 'checked' : ''}> ${ex.lab}</label>`;
            });
            
            document.getElementById('cancelFormBtn').addEventListener('click', () => {
                currentView = 'dashboard';
                renderDashboard();
            });
            
            document.getElementById('dynamicStudentForm').addEventListener('submit', (e) => {
                e.preventDefault();
                if (currentRole === 'teacher') { alert('No permission'); return; }
                const first = document.getElementById('fname').value.trim();
                const last = document.getElementById('lname').value.trim();
                if (!first || !last) { alert('First and Last name required'); return; }
                const middle = document.getElementById('mname').value;
                const fullName = buildFullName(first, middle, last);
                const examsSelected = Array.from(document.querySelectorAll('input[name="examCheck"]:checked')).map(cb => parseInt(cb.value));
                const newStudent = {
                    student_id: isEdit ? editTargetId : 0,
                    name: fullName, first_name: first, middle_name: middle, last_name: last,
                    dob: document.getElementById('dob').value, age: parseInt(document.getElementById('age').value),
                    blood_group: document.getElementById('bloodGroup').value,
                    gender: document.querySelector('input[name="gender"]:checked')?.value || 'Male',
                    address: document.getElementById('address').value, religion: document.getElementById('religion').value,
                    caste: document.getElementById('caste').value, mother_tongue: '',
                    aadhar: document.getElementById('aadhaar').value, state: document.getElementById('state').value,
                    city: document.getElementById('city').value, pincode: document.getElementById('pincode').value,
                    applying_class: document.getElementById('classApplying').value,
                    previous_school: document.getElementById('prevSchool').value,
                    father_name: document.getElementById('fatherName').value, father_occupation: document.getElementById('fatherOcc').value,
                    mother_name: document.getElementById('motherName').value, mother_occupation: document.getElementById('motherOcc').value,
                    father_contact: document.getElementById('fatherContact').value, mother_contact: document.getElementById('motherContact').value,
                    emergency_contact: document.getElementById('emergencyContact').value,
                    exams_array: examsSelected, exams: formatExamsString(examsSelected)
                };
                if (isEdit) {
                    const idx = studentsDatabase.findIndex(s => s.student_id === editTargetId);
                    if (idx !== -1) {
                        studentsDatabase[idx] = { ...studentsDatabase[idx], ...newStudent, student_id: editTargetId };
                    }
                    alert('Student updated!');
                } else {
                    newStudent.student_id = nextStudentId++;
                    studentsDatabase.push(newStudent);
                    alert('Student added!');
                }
                currentView = 'dashboard';
                renderDashboard();
            });
        }
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        renderApp();
    </script>
</body>
</html>
